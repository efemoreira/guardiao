<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FBF6DC" />
      <stop offset="100%" stop-color="#F0E7AE" />
    </radialGradient>

    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173B6E" />
      <stop offset="100%" stop-color="#091E3E" />
    </linearGradient>

    <linearGradient id="towerGradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6669" />
      <stop offset="100%" stop-color="#E5292C" />
    </linearGradient>

    <linearGradient id="towerGradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7B7E" />
      <stop offset="100%" stop-color="#F03D40" />
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#091E3E" flood-opacity="0.25" />
    </filter>

    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <clipPath id="shieldClip">
      <path
        d="M200 78
           L288 112
           V205
           C288 275 250 315 200 345
           C150 315 112 275 112 205
           V112
           Z"
      />
    </clipPath>
  </defs>

  <!-- Fundo circular (safe zone p/ avatar redondo) - creme, tom do favicon.ico atual -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)" />

  <!-- Escudo, proporção mais equilibrada (menos esticado) -->
  <g filter="url(#softShadow)">
    <path
      d="M200 78
         L288 112
         V205
         C288 275 250 315 200 345
         C150 315 112 275 112 205
         V112
         Z"
      fill="url(#shieldGrad)"
      stroke="#050F20"
      stroke-width="5"
      stroke-linejoin="round"
    />
    <!-- brilho superior, dá volume (mesmo recurso do favicon), desvanece suavemente -->
    <rect x="112" y="78" width="176" height="140" fill="url(#glossGrad)" clip-path="url(#shieldClip)" />
  </g>

  <!-- Prédio dentro do escudo -->
  <g stroke="#7A1113" stroke-width="3.5" stroke-linejoin="round">
    <!-- torre esquerda, mais baixa -->
    <rect x="140" y="212" width="50" height="85" rx="3" fill="url(#towerGradLeft)" />
    <!-- torre direita, mais alta -->
    <rect x="196" y="168" width="56" height="129" rx="3" fill="url(#towerGradRight)" />

    <!-- janelas torre esquerda -->
    <rect x="150" y="224" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="169" y="224" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="150" y="245" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="169" y="245" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="150" y="266" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="169" y="266" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />

    <!-- janelas torre direita -->
    <rect x="206" y="182" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="227" y="182" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="206" y="203" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="227" y="203" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="206" y="224" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="227" y="224" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="206" y="245" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="227" y="245" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="206" y="266" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />
    <rect x="227" y="266" width="9" height="9" rx="1.5" fill="#FBF6DC" stroke-width="1.5" />

    <!-- base -->
    <rect x="136" y="297" width="120" height="9" rx="2" fill="#E5292C" />
  </g>
</svg>
