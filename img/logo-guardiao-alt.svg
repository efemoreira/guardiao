<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- círculo agora em azul (era creme) -->
    <radialGradient id="bgGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#173B6E" />
      <stop offset="100%" stop-color="#091E3E" />
    </radialGradient>

    <!-- escudo agora em creme (era azul) -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF6DC" />
      <stop offset="100%" stop-color="#F0E7AE" />
    </linearGradient>

    <linearGradient id="towerGradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6669" />
      <stop offset="100%" stop-color="#E5292C" />
    </linearGradient>

    <linearGradient id="towerGradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7B7E" />
      <stop offset="100%" stop-color="#F03D40" />
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <!-- brilho agora escuro (era branco), pra aparecer sobre o escudo claro -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#091E3E" stop-opacity="0.18" />
      <stop offset="45%" stop-color="#091E3E" stop-opacity="0" />
    </linearGradient>

    <clipPath id="shieldClip">
      <path
        d="M200 54
           L304 94
           V204
           C304 286 259 334 200 369
           C141 334 96 286 96 204
           V94
           Z"
      />
    </clipPath>
  </defs>

  <!-- Fundo circular (safe zone p/ avatar redondo) - azul, tom do site -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)" />

  <!-- Escudo, proporção mais equilibrada (menos esticado) -->
  <g filter="url(#softShadow)">
    <path
      d="M200 54
         L304 94
         V204
         C304 286 259 334 200 369
         C141 334 96 286 96 204
         V94
         Z"
      fill="url(#shieldGrad)"
      stroke="#091E3E"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <!-- brilho superior, dá volume, desvanece suavemente -->
    <rect x="96" y="54" width="208" height="160" fill="url(#glossGrad)" clip-path="url(#shieldClip)" />
  </g>

  <!-- Prédio dentro do escudo (escalado junto com o escudo maior) -->
  <g stroke="#7A1113" stroke-width="4" stroke-linejoin="round">
    <!-- torre esquerda, mais baixa -->
    <rect x="129" y="212" width="59" height="100" rx="3.5" fill="url(#towerGradLeft)" />
    <!-- torre direita, mais alta -->
    <rect x="195" y="160" width="66" height="152" rx="3.5" fill="url(#towerGradRight)" />

    <!-- janelas torre esquerda -->
    <rect x="141" y="226" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="163" y="226" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="141" y="251" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="163" y="251" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="141" y="276" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="163" y="276" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />

    <!-- janelas torre direita -->
    <rect x="207" y="177" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="232" y="177" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="207" y="201" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="232" y="201" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="207" y="226" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="232" y="226" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="207" y="251" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="232" y="251" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="207" y="276" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />
    <rect x="232" y="276" width="10.5" height="10.5" rx="2" fill="#FBF6DC" stroke-width="2" />

    <!-- base -->
    <rect x="124" y="312" width="142" height="11" rx="2.5" fill="#E5292C" />
  </g>
</svg>
