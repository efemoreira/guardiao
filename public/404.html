<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página não encontrada</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #f5ebff 50%, #ffe5f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      animation: fadeIn 0.6s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-size: 120px;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1;
    }

    h1 {
      font-size: 36px;
      color: #1f2937;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }

    a, button {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #a855f7 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
    }

    .btn-secondary {
      border: 2px solid #d1d5db;
      color: #374151;
      background: white;
    }

    .btn-secondary:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .footer-text {
      font-size: 14px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      padding-top: 24px;
    }

    @media (max-width: 640px) {
      .error-code {
        font-size: 80px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 16px;
      }

      .button-group {
        flex-direction: column;
      }

      a, button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Página não encontrada</h1>
    <p>Desculpe, a página que você está procurando não existe ou foi movida.</p>

    <div class="button-group">
      <a href="/" class="btn-primary">🏠 Voltar ao início</a>
      <button class="btn-secondary" onclick="history.back()">← Voltar</button>
    </div>

    <div class="footer-text">
      Se acredita que isso é um erro, entre em contato conosco através do formulário de suporte.
    </div>
  </div>
</body>
</html>
